<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Pattern Tracking System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <!-- Animated Background -->
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="login-page">
        <div class="login-container">
            <!-- Back Button -->
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Home</span>
            </a>

            <!-- Login Box -->
            <div class="login-box student-login-box">
                <!-- Header with icon -->
                <div class="login-header">
                    <div class="login-icon student-login-icon">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <h2>Student Portal</h2>
                    <p>Log in to report your symptoms</p>
                </div>

                <!-- Login Form -->
                <form id="studentLoginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            <span>University Email</span>
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="student@university.edu" 
                            required
                            autocomplete="email"
                        >
                        <div class="input-border"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            <span>Password</span>
                        </label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Enter your password" 
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                        <div class="input-border"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember">
                            <span class="checkbox-custom"></span>
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-login btn-student-login">
                        <span>Sign In</span>
                        <i class="fas fa-sign-in-alt"></i>
                    </button>

                    <div class="error-message" id="errorMessage"></div>
                </form>

                <!-- Info Section -->
                <div class="info-section">
                    <div class="info-card info-card-blue">
                        <i class="fas fa-shield-alt"></i>
                        <span>Your reports are 100% anonymous</span>
                    </div>
                    <div class="info-card info-card-green">
                        <i class="fas fa-clock"></i>
                        <span>Quick & easy symptom logging</span>
                    </div>
                    <div class="info-card info-card-purple">
                        <i class="fas fa-chart-line"></i>
                        <span>Track your health history</span>
                    </div>
                </div>

                <!-- Demo Notice -->
                <div class="demo-notice">
                    <i class="fas fa-info-circle"></i>
                    <p><strong>Demo Mode:</strong> Use any email and password to log in</p>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // Add floating animation to info cards
        document.querySelectorAll('.info-card').forEach((card, index) => {
            card.style.animationDelay = `${index * 0.1}s`;
        });
    </script>
</body>
</html>
