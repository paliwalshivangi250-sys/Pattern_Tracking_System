<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Pattern Tracking System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <div class="animated-bg">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="login-page">
        <div class="login-container">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Home</span>
            </a>

            <div class="login-box admin-login-box">
                <div class="login-header">
                    <div class="login-icon admin-login-icon">
                        <i class="fas fa-user-shield"></i>
                    </div>
                    <h2>Admin Dashboard</h2>
                    <p>Access analytics and insights</p>
                </div>

                <form id="adminLoginForm" class="login-form">
                    <div class="form-group">
                        <label for="username">
                            <i class="fas fa-user"></i>
                            <span>Username</span>
                        </label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="admin"
                            required
                            autocomplete="username"
                        >
                        <div class="input-border"></div>
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            <span>Password</span>
                        </label>
                        <div class="password-wrapper">
                            <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Enter your password"
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                        <div class="input-border"></div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember">
                            <span class="checkbox-custom"></span>
                            <span>Remember me</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-login btn-admin-login">
                        <span>Access Dashboard</span>
                        <i class="fas fa-sign-in-alt"></i>
                    </button>

                    <div class="error-message" id="errorMessage"></div>
                </form>

                <div class="info-section">
                    <div class="info-card info-card-pink">
                        <i class="fas fa-chart-bar"></i>
                        <span>Real-time analytics dashboard</span>
                    </div>
                    <div class="info-card info-card-purple">
                        <i class="fas fa-chart-line"></i>
                        <span>Trend analysis & insights</span>
                    </div>
                    <div class="info-card info-card-orange">
                        <i class="fas fa-download"></i>
                        <span>Export & report generation</span>
                    </div>
                </div>

                <div class="security-badge">
                    <i class="fas fa-shield-virus"></i>
                    <span>Secured with end-to-end encryption</span>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        document.querySelectorAll('.info-card').forEach((card, index) => {
            card.style.animationDelay = `${index * 0.1}s`;
        });
    </script>
</body>
</html>
